set -g mouse on

set -g history-limit 10000

bind -n WheelUpPane select-pane -t = \; copy-mode -e \; send-keys -t = Up Up Up Up Up Up Up Up Up Up
bind -n WheelDownPane select-pane -t = \; send-keys -t = Down Down Down Down Down Down Down Down Down Down
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -t = Up Up Up Up Up Up Up Up Up Up" "if -Ft= '#{pane_in_mode}' 'send-keys -t = Up Up Up Up Up Up Up Up Up Up' 'copy-mode -e -t='"
bind -n WheelDownPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -t = Down Down Down Down Down Down Down Down Down Down" "if -Ft= '#{pane_in_mode}' 'send-keys -t = Down Down Down Down Down Down Down Down Down Down' 'send-keys -t = Down Down Down Down Down Down Down Down Down Down'"

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel
bind -T copy-mode-vi r send -X rectangle-toggle

set -g mode-keys vi

bind p paste-buffer
